services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tagging
      POSTGRES_USER: tagging
      POSTGRES_PASSWORD: tagging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagging -d tagging"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      - sh
      - -c
      - uv sync --all-groups && uv run uvicorn nir_tagging_service.app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    environment:
      TAGGING_DATABASE_URL: postgresql+psycopg://tagging:tagging@db:5432/tagging
      UV_PROJECT_ENVIRONMENT: /app/.venv
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uv_cache:/root/.cache/uv
      - api_venv:/app/.venv

volumes:
  postgres_data:
  uv_cache:
  api_venv:
